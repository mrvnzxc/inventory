# Optional: GraphQL API over the same Postgres used by Supabase.
# Set DATABASE_URL to your Supabase Postgres connection string (Settings → Database).
# Run: docker compose -f docker-compose.postgraphile.yml up
services:
  postgraphile:
    image: graphile/postgraphile:4
    ports:
      - '5000:5000'
    environment:
      DATABASE_URL: ${DATABASE_URL}
    command:
      - postgraphile
      - --connection
      - ${DATABASE_URL}
      - --schema
      - public
      - --host
      - 0.0.0.0
      - --port
      - '5000'
      - --enhance-graphiql
      - --dynamic-json
      - --cors
